<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join a Room | ChatSpace</title>
  <link rel="icon" href="/image/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:          #0a0a0f;
      --surface:     #12121a;
      --surface-2:   #1a1a26;
      --surface-3:   #20202e;
      --border:      rgba(255,255,255,0.07);
      --accent:      #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.35);
      --accent-2:    #c084fc;
      --text:        #f0eeff;
      --text-muted:  #7a7a9a;
      --success:     #4ade80;
      --error:       #f87171;
      --info:        #60a5fa;
      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Background ─────────────────────────────── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 520px; height: 520px;
      background: var(--accent);
      top: -180px; right: -100px;
    }

    .orb-2 {
      width: 380px; height: 380px;
      background: var(--accent-2);
      bottom: -100px; left: -80px;
      animation-delay: -6s;
      animation-duration: 22s;
    }

    .orb-3 {
      width: 200px; height: 200px;
      background: #38bdf8;
      top: 50%; left: 40%;
      animation-delay: -12s;
      animation-duration: 14s;
      opacity: 0.08;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, -20px) scale(1.05); }
      100% { transform: translate(-20px, 30px) scale(0.97); }
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
    }

    /* ── Card ────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      width: 440px;
      max-width: calc(100vw - 32px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      box-shadow:
        0 0 0 1px rgba(124,92,252,0.08),
        0 40px 80px rgba(0,0,0,0.6),
        0 0 60px var(--accent-glow);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── Brand ───────────────────────────────────── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .brand-icon svg { width: 18px; height: 18px; fill: white; }

    .brand-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    /* ── User pill (logged-in indicator) ─────────── */
    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 12px 5px 6px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
      width: fit-content;
      animation: fadeUp 0.6s 0.12s cubic-bezier(0.22,1,0.36,1) both;
    }

    .user-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      font-family: var(--font-display);
      flex-shrink: 0;
    }

    .user-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    /* ── Heading ─────────────────────────────────── */
    .heading {
      animation: fadeUp 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
      margin-bottom: 6px;
    }

    .heading h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .heading p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 300;
      animation: fadeUp 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Fields ──────────────────────────────────── */
    .fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 28px;
      animation: fadeUp 0.6s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    .field { position: relative; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .field-inner {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-inner .field-icon {
      position: absolute;
      left: 14px;
      width: 16px; height: 16px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .field-inner .field-icon svg {
      width: 16px; height: 16px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: rgba(122, 122, 154, 0.6); }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field input:focus ~ .field-icon,
    .field-inner:focus-within .field-icon {
      color: var(--accent);
    }

    /* ── Room suggestions ────────────────────────── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
      animation: fadeUp 0.6s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .suggestions-label {
      width: 100%;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0.7;
      margin-bottom: 2px;
    }

    .chip {
      padding: 5px 12px;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none;
    }

    .chip:hover {
      background: rgba(124, 92, 252, 0.15);
      border-color: rgba(124, 92, 252, 0.4);
      color: var(--accent-2);
    }

    /* ── Submit ──────────────────────────────────── */
    .submit-btn {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 24px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: fadeUp 0.6s 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--accent-glow); }
    .submit-btn:hover::after { opacity: 1; }
    .submit-btn:active { transform: translateY(0); }

    .submit-btn.loading {
      pointer-events: none;
      opacity: 0.75;
    }

    .submit-btn .btn-text { display: inline-flex; align-items: center; gap: 8px; }
    .submit-btn .btn-arrow { transition: transform 0.2s; display: inline-block; }
    .submit-btn:hover .btn-arrow { transform: translateX(3px); }

    .submit-btn .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Logout link ─────────────────────────────── */
    .card-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      animation: fadeUp 0.6s 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    .card-footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .card-footer a:hover { color: var(--error); }

    /* ── Toast ───────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
      z-index: 100;
      white-space: nowrap;
      max-width: calc(100vw - 40px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { border-color: rgba(74,222,128,0.3);  color: var(--success); }
    .toast.error   { border-color: rgba(248,113,113,0.3); color: var(--error); }
    .toast.info    { border-color: rgba(96,165,250,0.3);  color: var(--info); }

    .toast-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="bg-grid"></div>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.02 2 11c0 2.87 1.35 5.43 3.47 7.17L4 22l4.27-1.42A10.2 10.2 0 0 0 12 21c5.52 0 10-4.02 10-9S17.52 2 12 2Zm1 13H7v-2h6v2Zm3-4H7V9h9v2Z"/>
        </svg>
      </div>
      <span class="brand-name">ChatSpace</span>
    </div>

    <!-- Logged-in user pill -->
    <div class="user-pill" id="user-pill">
      <div class="user-avatar" id="user-avatar">?</div>
      <span id="user-email-label">Loading…</span>
      <div class="dot"></div>
    </div>

    <!-- Heading -->
    <div class="heading">
      <h1>Pick your room</h1>
      <p>Choose a display name and enter a room to start chatting.</p>
    </div>

    <!-- Fields -->
    <div class="fields">

      <div class="field">
        <label>Display Name</label>
        <div class="field-inner">
          <input
            type="text"
            id="username"
            placeholder="e.g. Alex"
            autocomplete="nickname"
            maxlength="24"
          />
          <span class="field-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
          </span>
        </div>
      </div>

      <div class="field">
        <label>Room Name</label>
        <div class="field-inner">
          <input
            type="text"
            id="room"
            placeholder="e.g. general"
            autocomplete="off"
            maxlength="32"
          />
          <span class="field-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 8.25h15m-16.5 7.5h15m-1.8-13.5-3.9 19.5m-2.1-19.5-3.9 19.5" />
            </svg>
          </span>
        </div>

       
        
      </div>

    </div>

    <!-- Join button -->
    <button class="submit-btn" id="join-btn" onclick="handleJoin()">
      <span class="btn-text">
        Join Chat
        <span class="btn-arrow">→</span>
      </span>
      <div class="spinner"></div>
    </button>

    <!-- Logout -->
    <div class="card-footer">
      Not you? <a href="#" onclick="handleLogout(); return false;">Sign out</a>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span id="toast-msg">Message</span>
  </div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js/dist/amazon-cognito-identity.min.js"></script>
  <script src="/js/join.js"></script>

</body>
</html>
