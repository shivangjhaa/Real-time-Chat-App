<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join | Chat App</title>
  <link rel="icon" href="/image/favicon.png" />
  <link rel="stylesheet" href="/css/styles.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/amazon-cognito-identity-js/6.3.6/amazon-cognito-identity.min.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a26;
      --border: rgba(255,255,255,0.07);
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.35);
      --accent-2: #c084fc;
      --text: #f0eeff;
      --text-muted: #7a7a9a;
      --success: #4ade80;
      --error: #f87171;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated background */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 520px;
      height: 520px;
      background: var(--accent);
      top: -180px;
      right: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 380px;
      height: 380px;
      background: var(--accent-2);
      bottom: -100px;
      left: -80px;
      animation-delay: -6s;
      animation-duration: 22s;
    }

    .orb-3 {
      width: 200px;
      height: 200px;
      background: #38bdf8;
      top: 50%;
      left: 40%;
      animation-delay: -12s;
      animation-duration: 14s;
      opacity: 0.08;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, -20px) scale(1.05); }
      100% { transform: translate(-20px, 30px) scale(0.97); }
    }

    /* Grid overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 420px;
      max-width: calc(100vw - 32px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      box-shadow:
        0 0 0 1px rgba(124,92,252,0.08),
        0 40px 80px rgba(0,0,0,0.6),
        0 0 60px var(--accent-glow);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo / brand mark */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .brand-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    /* Heading */
    .heading {
      animation: fadeUp 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
      margin-bottom: 6px;
    }

    .heading h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .heading p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 300;
      animation: fadeUp 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface-2);
      border-radius: 10px;
      padding: 4px;
      margin-top: 28px;
      margin-bottom: 28px;
      gap: 4px;
      animation: fadeUp 0.6s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    .tab-btn {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 7px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.22s ease;
      background: transparent;
      color: var(--text-muted);
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    /* Fields */
    .fields {
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: fadeUp 0.6s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .field {
      position: relative;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .field-inner {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-inner svg {
      position: absolute;
      left: 14px;
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .field input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder {
      color: rgba(122, 122, 154, 0.6);
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field input:focus + svg,
    .field-inner:focus-within svg {
      color: var(--accent);
    }

    /* Submit btn */
    .submit-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 24px var(--accent-glow);
      animation: fadeUp 0.6s 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .submit-btn:hover::after {
      opacity: 1;
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .submit-btn .btn-text { display: inline-block; transition: opacity 0.2s; }
    .submit-btn .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }

    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
      z-index: 100;
      white-space: nowrap;
      max-width: calc(100vw - 40px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { border-color: rgba(74,222,128,0.3); color: var(--success); }
    .toast.error   { border-color: rgba(248,113,113,0.3); color: var(--error); }

    .toast-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* Footer */
    .card-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      animation: fadeUp 0.6s 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 0;
      animation: fadeUp 0.6s 0.38s cubic-bezier(0.22,1,0.36,1) both;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>

<body>

  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="bg-grid"></div>

  <div class="card">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.02 2 11c0 2.87 1.35 5.43 3.47 7.17L4 22l4.27-1.42A10.2 10.2 0 0 0 12 21c5.52 0 10-4.02 10-9S17.52 2 12 2Zm1 13H7v-2h6v2Zm3-4H7V9h9v2Z"/>
        </svg>
      </div>
      <span class="brand-name">ChatSpace</span>
    </div>

    <div class="heading">
      <h1 id="heading-title">Welcome back</h1>
      <p id="heading-sub">Sign in to continue your conversations.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab-btn active" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="fields">
      <div class="field">
        <label>Email</label>
        <div class="field-inner">
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
          </svg>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="field-inner">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
          </svg>
        </div>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
      <span class="btn-text" id="btn-label">Create Account</span>
      <div class="spinner"></div>
    </button>

    <div class="divider"><span>or</span></div>

    <div class="card-footer">
      <span id="footer-text">Already have an account?</span>
      <a href="#" onclick="switchTab(currentTab === 'login' ? 'signup' : 'login'); return false;"
         style="color: var(--accent); text-decoration: none; font-weight: 500; margin-left: 4px;" id="footer-link">Sign in</a>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span id="toast-msg">Message</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/amazon-cognito-identity-js/6.3.6/amazon-cognito-identity.min.js"></script>
  <script src="/js/auth.js"></script>

  <script>
    let currentTab = 'signup';

    function switchTab(tab) {
      currentTab = tab;

      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');

      if (tab === 'login') {
        document.getElementById('heading-title').textContent = 'Welcome back';
        document.getElementById('heading-sub').textContent = 'Sign in to continue your conversations.';
        document.getElementById('btn-label').textContent = 'Sign In';
        document.getElementById('footer-text').textContent = "Don't have an account?";
        document.getElementById('footer-link').textContent = 'Create one';
      } else {
        document.getElementById('heading-title').textContent = 'Create account';
        document.getElementById('heading-sub').textContent = 'Join and start chatting in seconds.';
        document.getElementById('btn-label').textContent = 'Create Account';
        document.getElementById('footer-text').textContent = 'Already have an account?';
        document.getElementById('footer-link').textContent = 'Sign in';
      }
    }

    // Init
    switchTab('signup');

    function setLoading(on) {
      document.getElementById('submit-btn').classList.toggle('loading', on);
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      const msgEl = document.getElementById('toast-msg');
      toast.className = 'toast ' + type;
      msgEl.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    function handleSubmit() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('Please fill in all fields.', 'error');
        return;
      }

      setLoading(true);

      if (currentTab === 'signup') {
        signupUser(email, password);
      } else {
        loginUser(email, password);
      }
    }

    function signupUser(email, password) {
      try {
        signUp(email, password, {
          onSuccess: () => {
            setLoading(false);
            showToast('Account created! Check your email to verify.', 'success');
          },
          onFailure: (err) => {
            setLoading(false);
            showToast(err.message || 'Signup failed.', 'error');
          }
        });
      } catch(e) {
        // Fallback if auth.js uses alert pattern
        setLoading(false);
      }
    }

    function loginUser(email, password) {
      try {
        login(email, password, {
          onSuccess: () => setLoading(false),
          onFailure: (err) => {
            setLoading(false);
            showToast(err.message || 'Login failed.', 'error');
          }
        });
      } catch(e) {
        setLoading(false);
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>

</body>
</html>
